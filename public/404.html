<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Page Not Found - Turn Zero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #0d0e12;
        color: #ffffff;
        font-family: "Montserrat", sans-serif;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        box-sizing: border-box;
      }
      #particle-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
      }
      #box {
        position: relative;
        z-index: 2;
        padding: 40px 20px;
        max-width: 450px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 25px;
      }
      h1 {
        font-size: 6rem;
        font-weight: 700;
        margin: 0;
        letter-spacing: 12px;
        color: #ffffff;
        text-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
      }
      h2 {
        font-size: 1.2rem;
        font-weight: 500;
        margin: 0;
        letter-spacing: 5px;
        color: #00E5FF; /* Cyan accent matching inspect entropy */
        text-transform: uppercase;
      }
      p {
        font-size: 0.95rem;
        font-weight: 300;
        line-height: 1.6;
        color: #9CA3AF;
        margin: 0 0 10px 0;
      }
      #btn {
        background-color: #ffffff;
        color: #0d0e12;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 2px;
        padding: 16px 40px;
        border-radius: 50px;
        box-shadow: 0 10px 25px rgba(255, 255, 255, 0.08);
        transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s;
        text-transform: uppercase;
      }
      #btn:active {
        transform: scale(0.94);
        background-color: #e5e7eb;
      }
    </style>
  </head>
  <body>
    <canvas id="particle-canvas"></canvas>
    <div id="box">
      <h1>404</h1>
      <h2>Lost in Entropy</h2>
      <p>The page you are looking for does not exist, or has been swept away into the quantum void.</p>
      <a id="btn" href="/">Back to Game</a>
    </div>
    
    <script>
      const canvas = document.getElementById("particle-canvas");
      const ctx = canvas.getContext("2d");
      
      let particles = [];
      const colors = ["#00E5FF", "#A64DFF", "#F6C644", "#D3202A"];
      
      function resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        ctx.scale(dpr, dpr);
      }
      
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();
      
      class Sparkle {
        constructor() {
          this.x = Math.random() * window.innerWidth;
          this.y = Math.random() * window.innerHeight;
          this.color = colors[Math.floor(Math.random() * colors.length)];
          this.size = Math.random() * 3 + 1;
          this.vx = (Math.random() - 0.5) * 0.4;
          this.vy = (Math.random() - 0.5) * 0.4;
          this.maxLife = Math.random() * 2000 + 1000;
          this.life = this.maxLife;
        }
        update(dt) {
          this.x += this.vx;
          this.y += this.vy;
          this.life -= dt;
          
          if (this.x < 0 || this.x > window.innerWidth) this.vx *= -1;
          if (this.y < 0 || this.y > window.innerHeight) this.vy *= -1;
        }
        draw() {
          const ratio = this.life / this.maxLife;
          if (ratio <= 0) return;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.globalAlpha = ratio * 0.4;
          ctx.fill();
        }
      }
      
      // Seed particles
      for (let i = 0; i < 45; i++) {
        particles.push(new Sparkle());
      }
      
      let lastTime = Date.now();
      function loop() {
        const now = Date.now();
        const dt = now - lastTime;
        lastTime = now;
        
        ctx.clearRect(0, 0, canvas.width / (window.devicePixelRatio || 1), canvas.height / (window.devicePixelRatio || 1));
        
        particles.forEach((p, index) => {
          p.update(dt);
          p.draw();
          
          if (p.life <= 0) {
            particles[index] = new Sparkle(); // replace dead particle
          }
        });
        
        requestAnimationFrame(loop);
      }
      
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
