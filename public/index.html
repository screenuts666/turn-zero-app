<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Tap Roulette</title>

    <link rel="manifest" href="manifest.json" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Tap Roulette" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="trail-canvas"></canvas>
    <button id="home-btn" style="display: none;">
      <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
    </button>
    <div id="start-screen">
      <button id="settings-btn" aria-label="Settings">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
      <div class="testi-home">
        <h1 class="title">TAP ROULETTE</h1>
        <p class="subtitle">WHO GOES FIRST?</p>
      </div>
      <button id="start-btn">TAP TO PLAY</button>
    </div>

   <div id="ui-layer">
      <h1 id="message">Place your fingers</h1>
      <button id="restart-btn" style="display: none">
        <svg viewBox="0 0 24 24" width="36" height="36" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
      </button>
      <button id="math-btn" style="display: none">INSPECT ENTROPY</button>
    </div>

    <div id="math-modal" style="display: none;">
      <div class="math-box">
        <h2>QUANTUM ENTROPY LOG</h2>
        <div id="math-content"></div>
        <button id="close-math-btn">CLOSE</button>
      </div>
    </div>

    <div id="settings-modal" style="display: none;">
      <div class="settings-box">
        <h2>SETTINGS</h2>
        <div class="settings-options">
          <div class="setting-item">
            <span>Sound Effects</span>
            <label class="switch">
              <input type="checkbox" id="sound-toggle" checked>
              <span class="slider"></span>
            </label>
          </div>
          <div class="setting-item">
            <span>Vibration</span>
            <label class="switch">
              <input type="checkbox" id="vibrate-toggle" checked>
              <span class="slider"></span>
            </label>
          </div>
          <div class="setting-item flex-column">
            <div class="slider-label">
              <span>Countdown Timer</span>
              <span id="timer-val">5s</span>
            </div>
            <input type="range" id="timer-slider" min="2" max="10" value="5">
          </div>
        </div>
        <button id="close-settings-btn">CLOSE</button>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
