<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Turn Zero</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="apple-touch-icon" href="icon.svg" />

    <link rel="manifest" href="manifest.json" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Turn Zero" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="trail-canvas"></canvas>
    <button id="home-btn" style="display: none;">
      <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
    </button>
    <div id="start-screen">
      <button id="settings-btn" class="intro-fade delay-1" aria-label="Settings">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
      <div class="testi-home intro-anim-container">
        <svg class="intro-logo-svg" viewBox="150 50 212 300" style="width: 100px; height: auto; margin-bottom: 25px; display: inline-block;">
          <defs>
            <filter id="glow-white-app" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
              <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>
          <rect class="intro-logo-rect" x="176" y="80" width="160" height="240" rx="12" fill="none" stroke="#374151" stroke-width="4"/>
          <circle class="intro-logo-dot" cx="256" cy="200" r="18" fill="#ffffff" filter="url(#glow-white-app)"/>
          <circle class="intro-logo-wave1" cx="256" cy="200" r="45" fill="none" stroke="#ffffff" stroke-width="2" opacity="0"/>
          <circle class="intro-logo-wave2" cx="256" cy="200" r="70" fill="none" stroke="#ffffff" stroke-width="1" opacity="0"/>
        </svg>

        <h1 class="title intro-text delay-1">TURN ZERO</h1>
        <p class="subtitle intro-text delay-2">FIRST PLAYER SELECTOR</p>
      </div>
      <div class="mode-selector intro-fade delay-3">
        <button class="mode-btn active" data-mode="classic">CLASSIC</button>
        <button class="mode-btn" data-mode="teams">TEAMS</button>
        <button class="mode-btn" data-mode="order">ORDER</button>
      </div>
      <div id="teams-count-selector" class="sub-selector" style="display: none; opacity: 0;">
        <button class="team-count-btn active" data-count="2">2 TEAMS</button>
        <button class="team-count-btn" data-count="3">3 TEAMS</button>
        <button class="team-count-btn" data-count="4">4 TEAMS</button>
      </div>
      <button id="start-btn" class="intro-fade delay-4">TAP TO PLAY</button>
    </div>

   <div id="ui-layer">
      <h1 id="message">Place your fingers</h1>
      <button id="restart-btn" style="display: none">
        <svg viewBox="0 0 24 24" width="36" height="36" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
      </button>
      <button id="math-btn" style="display: none">INSPECT ENTROPY</button>
    </div>

    <div id="math-modal" style="display: none;">
      <div class="math-box">
        <h2>QUANTUM ENTROPY LOG</h2>
        <div id="math-content"></div>
        <button id="close-math-btn">CLOSE</button>
      </div>
    </div>

    <div id="settings-modal" style="display: none;">
      <div class="settings-box">
        <h2>SETTINGS</h2>
        <div class="settings-options">
          <div class="setting-item">
            <span>Sound Effects</span>
            <label class="switch">
              <input type="checkbox" id="sound-toggle" checked>
              <span class="slider"></span>
            </label>
          </div>
          <div class="setting-item">
            <span>Vibration</span>
            <label class="switch">
              <input type="checkbox" id="vibrate-toggle" checked>
              <span class="slider"></span>
            </label>
          </div>
          <div class="setting-item flex-column">
            <div class="slider-label">
              <span>Countdown Timer</span>
              <span id="timer-val">5s</span>
            </div>
            <input type="range" id="timer-slider" min="2" max="10" value="5">
          </div>
          <div class="setting-item flex-column">
            <div class="slider-label">
              <span>Audio Theme</span>
            </div>
            <div class="audio-theme-selector">
              <label class="theme-card">
                <input type="radio" name="audio-theme" value="minimal" style="display: none;" checked>
                <div class="theme-card-content">
                  <svg class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                  <span class="theme-title">Minimal</span>
                </div>
              </label>
              <label class="theme-card">
                <input type="radio" name="audio-theme" value="retro" style="display: none;">
                <div class="theme-card-content">
                  <svg class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="6" width="20" height="12" rx="2"></rect>
                    <path d="M12 12h.01"></path>
                    <path d="M17 12h.01"></path>
                    <path d="M6 12h4M8 10v4"></path>
                  </svg>
                  <span class="theme-title">Retro</span>
                </div>
              </label>
              <label class="theme-card">
                <input type="radio" name="audio-theme" value="scifi" style="display: none;">
                <div class="theme-card-content">
                  <svg class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
                  </svg>
                  <span class="theme-title">Sci-Fi</span>
                </div>
              </label>
            </div>
          </div>
        </div>
        <button id="close-settings-btn">CLOSE</button>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
